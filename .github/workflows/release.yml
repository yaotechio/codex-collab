name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          grep -q "\"version\": \"$V\"" .claude-plugin/plugin.json || { echo "plugin.json version != $V"; exit 1; }
          grep -q "@yaotech/codex-collab@$V" .mcp.json            || { echo ".mcp.json npx version != $V"; exit 1; }
          grep -q "@yaotech/codex-collab@$V" hooks/hooks.json     || { echo "hooks.json npx version != $V"; exit 1; }
          echo "version $V consistent across plugin.json / .mcp.json / hooks.json"

      - name: Run tests
        run: go test ./...

      - name: Build & publish npm packages
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set — add it under Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          echo "wrote $HOME/.npmrc; whoami:"
          npm whoami || { echo "::error::npm whoami failed — NPM_TOKEN is invalid or lacks access"; exit 1; }
          node scripts/build-npm.mjs --version "${{ steps.ver.outputs.version }}" --publish

      - name: Build raw binaries for the GitHub Release
        run: make dist VERSION="${{ steps.ver.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/codex-collab-*
          generate_release_notes: true
