name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          grep -q "\"version\": \"$V\"" .claude-plugin/plugin.json || { echo "plugin.json version != $V"; exit 1; }
          grep -q "@yaotech/codex-collab@$V" .mcp.json            || { echo ".mcp.json npx version != $V"; exit 1; }
          grep -q "@yaotech/codex-collab@$V" hooks/hooks.json     || { echo "hooks.json npx version != $V"; exit 1; }
          echo "version $V consistent across plugin.json / .mcp.json / hooks.json"

      - name: Run tests
        run: go test ./...

      - name: Build & publish npm packages
        run: node scripts/build-npm.mjs --version "${{ steps.ver.outputs.version }}" --publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build raw binaries for the GitHub Release
        run: make dist VERSION="${{ steps.ver.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/codex-collab-*
          generate_release_notes: true
